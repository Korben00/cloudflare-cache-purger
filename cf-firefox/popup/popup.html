<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Cloudflare Cache Purger</h1>
    </div>
    
    <div class="content">
      <div class="buttons">
        <button id="purgeCurrentPage">Purge Current Page</button>
        <button id="purgePageResources">Purge Page Resources</button>
        <button id="purgeAll">Purge Entire Cache</button>
      </div>

      <div class="tag-section">
        <label for="tagInput">Purge by Cache-Tag</label>
        <div class="tag-input-row">
          <input type="text" id="tagInput" list="tagSuggestions" placeholder="css, js, html...">
          <button id="purgeByTag">Purge</button>
        </div>
        <datalist id="tagSuggestions">
          <option value="css">
          <option value="js">
          <option value="html">
          <option value="image">
          <option value="font">
          <option value="video">
          <option value="css, js">
          <option value="css, js, html">
        </datalist>
        <small>Pick a tag or type comma-separated values (requires server-side Cache-Tag headers)</small>
      </div>

      <div id="message"></div>
    </div>

    <div class="footer">
      <a href="https://korben.info" target="_blank" class="author-link">Made by Korben</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
